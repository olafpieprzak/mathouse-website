name = "mathouse-tidycal-proxy"
main = "src/index.js"
compatibility_date = "2026-05-01"

# === Konfiguracja środowiska ===
# UWAGA: TIDYCAL_API_KEY ustawiasz przez:
#   wrangler secret put TIDYCAL_API_KEY
# albo przez panel Cloudflare → Workers → Settings → Variables → Add Secret
#
# NIGDY nie wpisuj klucza tutaj — ten plik trafia do GitHuba publicznie!

[vars]
ALLOWED_ORIGIN = "https://mathouse.pl"

# === Custom domain (opcjonalne, dla łatwiejszego wywołania) ===
# Po wdrożeniu można podpiąć subdomenę: api.mathouse.pl → Worker
# [[routes]]
# pattern = "api.mathouse.pl/*"
# custom_domain = true
